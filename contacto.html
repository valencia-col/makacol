<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>John - Soluções Digitais</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 35px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 300px;
            border-top: 5px solid #3498db;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .desc {
            font-size: 14px;
            color: #7f8c8d;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .btn-contact {
            background-color: #3498db; /* Azul en lugar de Verde para que no parezca de una préstamo/dinero */
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            display: block;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="name">JOHN</div>
        <div class="desc">
            Consultoria de Vendas e<br>
            Fidelização de Clientes<br>
            <small>Maranhão</small>
        </div>
        
        <a href="https://api.whatsapp.com/send?phone=5598985001458&text=Olá%20John,%20vi%20seu%20contato%20e%20gostaria%20de%20agendar%20uma%20visita." class="btn-contact">
            ENVIAR MENSAGEM
        </a>
    </div>

</body>
</html>
