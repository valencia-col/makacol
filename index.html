<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7QEGYFKYQD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-7QEGYFKYQD');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Macacol - Valencia Col</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; color: white; }
        #mensaje-mico { 
    color: #f39c12; 
    font-weight: bold; 
    min-height: 35px; /* Le dimos un poquito más de espacio */
    margin-bottom: 8px; 
    font-size: 1.1rem; 
    text-align: center; 
    width: 100%;
    visibility: hidden; /* Esto es lo que cambió */
    opacity: 0;
    transition: opacity 0.4s;
        }
        .calculator { background-color: #1e1e1e; width: 100%; max-width: 340px; padding: 25px; border-radius: 45px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); margin-bottom: 10px; border: 1px solid #333; }
        /* Ajuste para que el área táctil sea pequeña y precisa */
.logo-container { 
    text-align: center; /* Esto centra todo lo que esté adentro horizontalmente */
    margin-bottom: 10px;
    width: 100%;        /* Esto obliga a que el contenedor ocupe todo el ancho */
    display: flex;      /* Usamos flexbox para centrar de forma profesional */
    justify-content: center; /* Centrado horizontal */
}

.logo-container img { 
    width: 75px; 
    height: 75px; 
    border-radius: 50%; 
    border: 3px solid #f39c12; 
    cursor: pointer;
    /* Al estar dentro de un flex container, se centrará solo */
}
        .display-container { display: flex; flex-direction: column; align-items: flex-end; width: 100%; margin-bottom: 15px; padding: 0 10px; }
        #display { width: 100%; height: 60px; background: transparent; border: none; color: #f39c12; font-size: 3.5rem; text-align: right; outline: none; }
        #preview { color: #888; font-size: 1.2rem; height: 20px; text-align: right; margin-top: -5px; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
        button { aspect-ratio: 1/1; border-radius: 50%; border: none; font-size: 1.6rem; font-weight: bold; background: #333; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 0 #1a1a1a; }
        button:active { background: #f39c12 !important; transform: translateY(3px); box-shadow: none; }
        .operator { background: #444; color: #f39c12; }
        .clear { background: #c0392b; color: white; }
        .wide-btn { grid-column: span 2; border-radius: 35px; aspect-ratio: auto; height: 65px; }
        .equal { background: #f39c12; color: white; box-shadow: 0 4px 0 #d35400; }
        
        /* ENLACE AL CAFÉ (donar.html) */
        .donation-btn { margin-top: 15px; background: #ffffff; color: #000; padding: 12px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.9rem; width: 100%; max-width: 300px; }
        
        .ad-container { width: 100%; max-width: 320px; min-height: 50px; background: #1a1a1a; border-radius: 12px; margin-top: 20px; display: flex; justify-content: center; align-items: center; border: 1px dashed #333; }
        .footer-brand { margin-top: 20px; text-align: center; opacity: 0.7; font-size: 0.8rem; }
        
        /* ENLACE A PRIVACIDAD (privacidad.html) */
        .footer-brand a { color: #f39c12; text-decoration: none; display: block; margin-top: 10px; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

<div id="mensaje-mico"></div>

<div class="calculator">
    <div class="logo-container">
    <img src="chimpance.jpg" alt="Macacol" onclick="hablarMico()" ontouchstart="hablarMico()" style="cursor: pointer;">
    </div>
    <div class="display-container">
        <input type="text" id="display" readonly value="0">
        <div id="preview"></div> 
    </div>
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendOperator('%')">%</button>
        <button class="operator" onclick="appendOperator('/')">÷</button>
        <button class="operator" onclick="appendOperator('*')">×</button>
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button class="operator" onclick="appendOperator('-')">−</button>
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button class="operator" onclick="appendOperator('+')">+</button>
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button class="operator" onclick="deleteLast()">DEL</button>
        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="appendToDisplay('.')">.</button>
        <button class="wide-btn equal" onclick="calculate()">=</button>
    </div>
</div>

<a href="historia.html" class="donation-btn" id="btn-historia">
    <span id="btn-texto">Conoce nuestra historia</span>
</a>

<div class="ad-container">
    <span style="font-size: 0.7rem; color: #444;">Publicidade / Publicidad</span>
</div>

<div class="footer-brand">
    <p>© 2026 <strong>Valencia Col Innovative Solutions</strong></p>
    <a href="https://docs.google.com/document/d/1571A4Zbv6mxbUfxJch1v_DOh5KdFJgHUU0n9BdsPzb8/edit?usp=sharing">Política de Privacidad / Privacidade</a>
</div>

<script>
    // 1. Declaración de variables globales
    const display = document.getElementById('display');
    const preview = document.getElementById('preview');
    const mensajeDiv = document.getElementById('mensaje-mico');
    let ultimaFrase = -1;
    let bloqueado = false;

    // 2. Funciones de la calculadora
    function hablarMico() {
        if (bloqueado) return;
        bloqueado = true;
        const esPT = navigator.language.startsWith('pt');
        const frasesES = ["¡Eres un genio!", "¡Suma victorias!", "¡Macacol te apoya!", "¡Hoy ganarás!", "¡Valencia Col innova!", "¡Sigue adelante!", "¡Potencial infinito!"];
        const frasesPT = ["Você é um gênio!", "Some vitórias!", "Macacol te apoia!", "Hoje você ganha!", "Valencia Col inova!", "Siga em frente!", "Potencial infinito!"];
        const frases = esPT ? frasesPT : frasesES;
        let indice;
        do { indice = Math.floor(Math.random() * frases.length); } while (indice === ultimaFrase);
        ultimaFrase = indice;
        mensajeDiv.innerText = frases[indice];
        mensajeDiv.style.opacity = "1";
        if (navigator.vibrate) navigator.vibrate(30);
        setTimeout(() => { mensajeDiv.style.opacity = "0"; bloqueado = false; }, 2500);
    }

    function updatePreview() {
        try {
            let val = display.value;
            if (val === '0' || val === '' || !/[+*×/÷%−-]/.test(val)) { preview.innerText = ""; return; }
            let operacion = val.replace(/×/g, '*').replace(/−/g, '-').replace(/÷/g, '/').replace(/%/g, '/100');
            let res = eval(operacion);
            if (res !== undefined && !isNaN(res)) { preview.innerText = "= " + Number(res.toFixed(4)); } else { preview.innerText = ""; }
        } catch (e) { preview.innerText = ""; }
    }
    
    function appendToDisplay(value) {
        if (navigator.vibrate) navigator.vibrate(40);
        if (display.value === '0') { display.value = value; } else { display.value += value; }
        ajustarFuente();
        updatePreview();
    }

    function appendOperator(op) {
        if (navigator.vibrate) navigator.vibrate(40);
        const lastChar = display.value.slice(-1);
        if (['+','-','*','/','%','×','−','÷'].includes(lastChar)) { display.value = display.value.slice(0, -1) + op; } else { display.value += op; }
        updatePreview();
    }

    function clearDisplay() { display.value = '0'; preview.innerText = ''; ajustarFuente(); }
    
    function calculate() {
        try {
            let operacion = display.value.replace(/×/g, '*').replace(/−/g, '-').replace(/÷/g, '/').replace(/%/g, '/100');
            let res = eval(operacion);
            display.value = Number(res.toFixed(8));
            preview.innerText = '';
            ajustarFuente();
        } catch { display.value = 'Error'; setTimeout(clearDisplay, 1500); }
    }

    function deleteLast() { display.value = display.value.slice(0, -1) || '0'; ajustarFuente(); updatePreview(); }

    function ajustarFuente() {
        let largo = display.value.length;
        if (largo > 12) display.style.fontSize = "1.8rem";
        else if (largo > 8) display.style.fontSize = "2.5rem";
        else display.style.fontSize = "3.5rem";
    }

    // 3. Lógica de inicio
    window.onload = function() {
        const esPT = navigator.language.startsWith('pt');
        const btnTexto = document.getElementById('btn-texto');
        if (btnTexto) {
            btnTexto.innerText = esPT ? "Conheça nossa história" : "Conoce nuestra historia";
        }
    };
    // EL SEGURO DE VIDA PARA FUNCIONAR SIN INTERNET (No toca nada de arriba)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
                                               }
</script>
</body>
</html>
