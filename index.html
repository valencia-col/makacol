<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-7QEGYFKYQD"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Macacol</title>
    <style>
        /* MANTENEMOS TU ESTÉTICA ORIGINAL */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; color: white; }
        #mensaje-mico { color: #f39c12; font-weight: bold; height: 25px; margin-bottom: 8px; font-size: 1.1rem; transition: opacity 0.4s; opacity: 0; text-align: center; }
        .calculator { background-color: #1e1e1e; width: 100%; max-width: 340px; padding: 25px; border-radius: 45px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); margin-bottom: 15px; border: 1px solid #333; }
        .logo-container { text-align: center; margin-bottom: 10px; cursor: pointer; }
        .logo-container img { width: 75px; height: 75px; border-radius: 50%; border: 3px solid #f39c12; transition: transform 0.2s; }
        
        /* CONTENEDOR DE PANTALLA MODIFICADO */
        .display-container { display: flex; flex-direction: column; align-items: flex-end; width: 100%; margin-bottom: 10px; }
        #display { width: 100%; height: 60px; background: transparent; border: none; color: #f39c12; font-size: 3.5rem; text-align: right; outline: none; }
        
        /* ESTILO PARA EL RESULTADO PEQUEÑO (TEMPO REAL) */
        #preview { color: #888; font-size: 1.2rem; height: 20px; text-align: right; padding-right: 5px; }

        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
        button { aspect-ratio: 1/1; border-radius: 50%; border: none; font-size: 1.6rem; font-weight: bold; background: #333; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 0 #1a1a1a; }
        button:active { background: #f39c12 !important; transform: translateY(3px); box-shadow: none; }
        .operator { background: #444; color: #f39c12; }
        .clear { background: #c0392b; color: white; }
        .wide-btn { grid-column: span 2; border-radius: 35px; aspect-ratio: auto; height: 65px; }
        .equal { background: #f39c12; color: white; box-shadow: 0 4px 0 #d35400; }
        .donation-btn { margin-top: 15px; background: #ffffff; color: #000; padding: 10px 20px; border-radius: 25px; text-decoration: none; font-weight: bold; display: flex; align-items: center; gap: 10px; font-size: 0.9rem; }
        .footer-brand { margin-top: 20px; text-align: center; opacity: 0.6; }
        .footer-brand span { color: #f39c12; font-weight: bold; }
        .ad-container { width: 100%; max-width: 320px; min-height: 50px; background: #1e1e1e; border-radius: 12px; margin-top: 15px; }

        @media (max-height: 700px) {
            .logo-container img { max-width: 60px; height: 60px; }
            .calculator { padding: 15px; }
        }
    </style>
</head>
<body>

<div id="mensaje-mico"></div>

<div class="calculator">
    <div class="logo-container" onclick="hablarMico()">
        <img src="chimpance.jpg" alt="Macacol">
    </div>
    
    <div class="display-container">
        <input type="text" id="display" readonly value="0">
        <div id="preview"></div> </div>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendOperator('%')">%</button>
        <button class="operator" onclick="appendOperator('/')">÷</button>
        <button class="operator" onclick="appendOperator('*')">×</button>
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button class="operator" onclick="appendOperator('-')">−</button>
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button class="operator" onclick="appendOperator('+')">+</button>
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button class="operator" onclick="deleteLast()">DEL</button>
        <button onclick="appendToDisplay('0')">0</button>
        <button onclick="appendToDisplay('.')">.</button>
        <button class="wide-btn equal" onclick="calculate()">=</button>
    </div>
</div>

<a href="https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=felipinhotocantins@gmail.com&item_name=Apoyo+a+Macacol&currency_code=USD" target="_blank" class="donation-btn">
    <span>☕</span> <span id="texto-cafe">Invítame un café</span>
</a>

<div class="footer-brand">
    <p>© 2026 <span>Valencia Col</span> | Innovative Solutions</p>
</div>

<script>
    const display = document.getElementById('display');
    const preview = document.getElementById('preview');
    const mensajeDiv = document.getElementById('mensaje-mico');
    let lastCharIsOperator = false;

    // --- NUEVA LÓGICA DE PRE-VISUALIZACIÓN ---
    function updatePreview() {
        try {
            let val = display.value;
            // Si el último es un signo, no calculamos todavía para evitar error
            if (lastCharIsOperator || val === '0' || val === '') {
                preview.innerText = "";
                return;
            }
            
            let operacion = val.replace(/×/g, '*').replace(/−/g, '-').replace(/÷/g, '/').replace(/%/g, '/100');
            let res = eval(operacion);
            
            // Solo mostramos si el resultado es distinto a lo que ya está escrito
            if (res !== undefined && res.toString() !== val) {
                preview.innerText = "= " + Number(res.toFixed(4));
            } else {
                preview.innerText = "";
            }
        } catch (e) {
            preview.innerText = ""; // Si hay error (ej: "5+"), que no muestre nada
        }
    }

    function appendToDisplay(value) {
        if (navigator.vibrate) navigator.vibrate(45);
        if (display.value === '0') display.value = value;
        else display.value += value;
        lastCharIsOperator = false;
        ajustarFuente();
        updatePreview(); // Actualizar resultado abajo
    }

    function appendOperator(operator) {
        if (navigator.vibrate) navigator.vibrate(45);
        if (display.value === '0' && operator !== '-') return;
        if (lastCharIsOperator) {
            display.value = display.value.slice(0, -1) + operator;
        } else {
            display.value += operator;
        }
        lastCharIsOperator = true;
        ajustarFuente();
        updatePreview();
    }

    function clearDisplay() { 
        display.value = '0';
        preview.innerText = '';
        lastCharIsOperator = false;
        ajustarFuente(); 
    }

    function calculate() {
        try {
            let operacion = display.value.replace(/×/g, '*').replace(/−/g, '-').replace(/÷/g, '/').replace(/%/g, '/100');
            let resultado = eval(operacion);
            display.value = Number(resultado.toFixed(8));
            preview.innerText = ''; // Limpiar la pre-visualización al dar igual
            lastCharIsOperator = false;
            ajustarFuente();
        } catch {
            display.value = 'Error';
            setTimeout(clearDisplay, 1500);
        }
    }

    // Funciones de utilidad (vibra, borrar, frases mico) se mantienen...
    function deleteLast() { 
        display.value = display.value.slice(0, -1) || '0';
        let ultimo = display.value.slice(-1);
        lastCharIsOperator = (['+','-','*','/','%','×','−','÷'].includes(ultimo));
        ajustarFuente();
        updatePreview();
    }

    function ajustarFuente() {
        let largo = display.value.length;
        if (largo > 12) display.style.fontSize = "1.5rem";
        else if (largo > 8) display.style.fontSize = "2.2rem";
        else display.style.fontSize = "3.5rem";
    }
    
    // (Aquí iría el resto de tu código de frases y service worker)
</script>
</body>
</html>
