<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Macacol</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="chimpance.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="theme-color" content="#ff9800">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7707383885418601" crossorigin="anonymous"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: #121212;
            display: flex;
            flex-direction: column; /* Para que el banner vaya abajo */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .calculator {
            background-color: #1e1e1e;
            width: 100%;
            max-width: 330px;
            padding: 25px;
            border-radius: 45px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            margin-bottom: 20px; /* Espacio para el anuncio */
        }

        .logo-container { text-align: center; margin-bottom: 10px; }
        .logo-container img {
            width: 60px; height: 60px;
            border-radius: 50%;
            border: 2px solid #f39c12;
        }

        #display {
            width: 100%;
            height: 70px;
            background: transparent;
            border: none;
            color: #f39c12;
            font-size: 3.2rem;
            text-align: right;
            margin-bottom: 15px;
            outline: none;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            background: #333;
            color: white;
            cursor: pointer;
            transition: background 0.1s, transform 0.1s;
        }

        button:active {
            background: #f39c12 !important;
            transform: scale(0.9);
        }

        .operator { background: #444; color: #f39c12; }
        .equal { background: #f39c12; color: white; grid-column: span 2; border-radius: 30px; aspect-ratio: auto; }
        .clear { background: #c0392b; color: white; }

        /* ESPACIO PARA EL BANNER (ESTÉTICO) */
        .ad-container {
            width: 100%;
            max-width: 320px;
            min-height: 50px;
            background: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="calculator">
    <div class="logo-container">
        <img src="chimpance.jpg" alt="Logo">
    </div>
    <input type="text" id="display" readonly value="0">
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendToDisplay('/')">/</button>
        <button class="operator" onclick="appendToDisplay('*')">×</button>
        <button class="operator" onclick="deleteLast()">DEL</button>
        
        <button onclick="appendToDisplay('7')">7</button>
        <button onclick="appendToDisplay('8')">8</button>
        <button onclick="appendToDisplay('9')">9</button>
        <button class="operator" onclick="appendToDisplay('-')">−</button>
        
        <button onclick="appendToDisplay('4')">4</button>
        <button onclick="appendToDisplay('5')">5</button>
        <button onclick="appendToDisplay('6')">6</button>
        <button class="operator" onclick="appendToDisplay('+')">+</button>
        
        <button onclick="appendToDisplay('1')">1</button>
        <button onclick="appendToDisplay('2')">2</button>
        <button onclick="appendToDisplay('3')">3</button>
        <button class="equal" onclick="calculate()">=</button>
        
        <button onclick="appendToDisplay('0')" style="grid-column: span 2; border-radius: 30px; aspect-ratio: auto;">0</button>
        <button onclick="appendToDisplay('.')">.</button>
    </div>
</div>

<div class="ad-container">
    <ins class="adsbygoogle"
         style="display:inline-block;width:320px;height:50px"
         data-ad-client="ca-pub-7707383885418601"
         data-ad-slot="4692934061"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
</div>

<script>
    const display = document.getElementById('display');

    function vibrate() {
        if (navigator.vibrate) {
            navigator.vibrate(40); 
        }
    }

    function appendToDisplay(value) {
        vibrate();
        if (display.value === '0') display.value = value;
        else display.value += value;
    }

    function clearDisplay() {
        vibrate();
        display.value = '0';
    }

    function deleteLast() {
        vibrate();
        display.value = display.value.slice(0, -1) || '0';
    }

    function calculate() {
        vibrate();
        try {
            let expression = display.value.replace('×', '*').replace('−', '-');
            display.value = eval(expression);
        } catch {
            display.value = 'Error';
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>

</body>
</html>
